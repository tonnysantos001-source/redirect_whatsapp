<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            justify-content: center;
        }

        .logo-wrapper {
            margin-bottom: 30px;
        }

        /* SVG do WhatsApp em cinza claro */
        .logo {
            width: 72px;
            height: 72px;
            color: #d1d7db;
        }

        .progress-container {
            width: 280px;
            height: 3px;
            background-color: #e9edef;
            border-radius: 1.5px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background-color: #25d366;
            width: 0%;
            animation: loadProgress 2s ease-out forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .title {
            color: #41525d;
            font-size: 16px;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .footer {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .footer-from {
            color: #8696a0;
            font-size: 12px;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .meta-logo-wrapper {
            display: flex;
            align-items: center;
            color: #111b21;
        }

        .meta-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        /* Suporte ao Modo Escuro nativo do navegador para o celular/PC da pessoa */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #111b21;
            }
            .logo {
                color: #2a3942;
            }
            .progress-container {
                background-color: #2a3942;
            }
            .title {
                color: #e9edef;
            }
            .footer-from {
                color: #8696a0;
            }
            .meta-logo-wrapper {
                color: #e9edef;
            }
        }
    </style>

    <!-- ============================================== -->
    <!-- SUA TAG DO GOOGLE ADS DEVE SER COLADA ABAIXO   -->
    <!-- ============================================== -->
    <!-- Exemplo: <script async src="https://www.googletagmanager.com/gtag/js?id=AW-XXXXX..."></script> -->
    <script>
        // O código do Google virá aqui
    </script>
    <!-- ============================================== -->

    <script>
        // ==============================================
        // CONFIGURAÇÕES DO REDIRECIONAMENTO WHATSAPP
        // ==============================================
        
        // 1. Coloque aqui o número do WhatsApp (Código do país + ddd + número, ex: 5511999999999)
        const numeroWhatsApp = "5513991055732"; 
        
        // 2. Coloque a mensagem padrão (se houver). Se não quiser mensagem, deixe aspas vazias "".
        const mensagemPadrao = "Olá! Vim pelo anúncio e gostaria de mais informações."; 
        
        // 3. Tempo em milissegundos que a tela de carregamento vai aparecer antes de redirecionar
        // (Recomendado 2000 a 3000 milissegundos para dar tempo para a tag do Google Ads disparar)
        const tempoRedirecionamento = 2500; 

        // Lógica de Redirecionamento
        window.onload = function() {
            const urlEncodedMessage = encodeURIComponent(mensagemPadrao);
            let linkRedirecionamento = `https://api.whatsapp.com/send?phone=${numeroWhatsApp}`;
            
            if (mensagemPadrao.trim() !== "") {
                linkRedirecionamento += `&text=${urlEncodedMessage}`;
            }

            // Inicia o redirecionamento após o "tempo de carregamento" virtual
            setTimeout(function() {
                window.location.href = linkRedirecionamento;
            }, tempoRedirecionamento);
        };
    </script>
</head>
